<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      :root{--bg-primary:#0d0d0f;--bg-secondary:#161618;--bg-tertiary:#1e1e21;--text-primary:#fafafa;--text-secondary:#a1a1aa;--accent:#6366f1;--border:#27272a;--radius:10px}
      .light{--bg-primary:#f8fafc;--bg-secondary:#fff;--bg-tertiary:#f1f5f9;--text-primary:#0f172a;--text-secondary:#475569;--border:#e2e8f0}
      *{box-sizing:border-box}
      body{margin:0;min-height:100vh;background:var(--bg-primary);color:var(--text-primary);font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
    </style>
    <script>
      (function(){var t=localStorage.getItem('devtool-theme');if(t==='light')document.documentElement.classList.add('light');else document.documentElement.classList.add('dark');})();
    </script>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Corporate Tools Portal</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
